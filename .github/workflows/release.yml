name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          # Nothing here pushes via git; gh uses GH_TOKEN explicitly.
          persist-credentials: false

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Guard: VERSION is spliced into sed and file names below.
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)*$'; then
            echo "Tag does not look like a version: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Resources/Info.plist

      # Official GitHub pattern for signing on macOS runners: import the
      # identity into an ephemeral keychain that dies with the VM. The cert is
      # self-signed but stable across releases, so users' Accessibility (TCC)
      # grants survive upgrades without any local re-signing.
      - name: Import signing identity
        env:
          SIGNING_CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if [ -z "$SIGNING_CERT_P12" ]; then
            echo "Missing SIGNING_CERT_P12 secret; run scripts/generate-release-cert.sh" >&2
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          printf '%s' "$SIGNING_CERT_P12" | base64 -d > "$RUNNER_TEMP/signing.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/signing.p12" -P "$SIGNING_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          rm -f "$RUNNER_TEMP/signing.p12"

      - name: Build app (signed with the release identity)
        run: CODE_SIGN_IDENTITY="Fixit Release Signing" ./scripts/build-app.sh

      - name: Package
        run: |
          STAGE="$(mktemp -d)"
          cp -R dist/Fixit.app "$STAGE/"
          COPYFILE_DISABLE=1 ditto -c -k "$STAGE" "Fixit-$VERSION.zip"
          echo "SHA256=$(shasum -a 256 "Fixit-$VERSION.zip" | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Render Homebrew cask
        run: |
          sed -e "s/{{VERSION}}/$VERSION/" -e "s/{{SHA256}}/$SHA256/" \
            packaging/homebrew/fixit.rb > fixit.rb

      # Run the same `brew style` check the tap's CI runs, against the
      # rendered cask in real tap context, so a bad template (e.g. stanza
      # order) fails the release here instead of turning the tap's CI red.
      - name: Lint rendered cask
        run: |
          brew tap ivanrvpereira/tap
          cp fixit.rb "$(brew --repository ivanrvpereira/tap)/Casks/fixit.rb"
          brew style ivanrvpereira/tap

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "Fixit-$VERSION.zip" fixit.rb \
            --title "Fixit $VERSION" --generate-notes

      # Publish the rendered cask so brew picks up the release. Runs after the
      # release exists (the cask URL points at its assets). TAP_PUSH_TOKEN is a
      # fine-grained PAT with Contents read/write on ivanrvpereira/homebrew-tap
      # only; without it the step skips and the cask is copied manually.
      - name: Update Homebrew tap
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TAP_PUSH_TOKEN" ]; then
            echo "TAP_PUSH_TOKEN not set; copy fixit.rb to the tap manually." >&2
            exit 0
          fi
          TAP="ivanrvpereira/homebrew-tap"
          export GH_TOKEN="$TAP_PUSH_TOKEN"
          SHA="$(gh api "repos/$TAP/contents/Casks/fixit.rb" --jq .sha 2>/dev/null || true)"
          CONTENT="$(base64 -i fixit.rb | tr -d '\n')"
          if [ -n "$SHA" ]; then
            TAP_COMMIT="$(gh api -X PUT "repos/$TAP/contents/Casks/fixit.rb" \
              -f message="fixit $VERSION" -f content="$CONTENT" -f sha="$SHA" --jq .commit.sha)"
          else
            TAP_COMMIT="$(gh api -X PUT "repos/$TAP/contents/Casks/fixit.rb" \
              -f message="fixit $VERSION" -f content="$CONTENT" --jq .commit.sha)"
          fi
          echo "Updated $TAP Casks/fixit.rb to $VERSION ($TAP_COMMIT)"
          echo "TAP_COMMIT=$TAP_COMMIT" >> "$GITHUB_ENV"

      # Wait for the tap's own CI to pass on the cask commit, so a release
      # only goes green once the published tap is verified healthy. The tap
      # is public, so the default token can read its check runs.
      - name: Verify tap CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$TAP_COMMIT" ]; then
            echo "No tap commit to verify (tap push skipped)."
            exit 0
          fi
          TAP="ivanrvpereira/homebrew-tap"
          for _ in $(seq 1 40); do
            STATE="$(gh api "repos/$TAP/commits/$TAP_COMMIT/check-runs" --jq '
              [.check_runs[]] |
              if length == 0 then "pending"
              elif any(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out") then "failure"
              elif all(.status == "completed") then "success"
              else "pending" end')"
            case "$STATE" in
              success) echo "Tap CI passed for $TAP_COMMIT"; exit 0 ;;
              failure) echo "Tap CI failed for $TAP_COMMIT: https://github.com/$TAP/commits" >&2; exit 1 ;;
            esac
            echo "Tap CI $STATE; waiting..."
            sleep 30
          done
          echo "Timed out waiting for tap CI on $TAP_COMMIT" >&2
          exit 1

      # Hosted runners are ephemeral, but delete the signing keychain anyway
      # (defense in depth, and required if this ever moves to a self-hosted runner).
      - name: Delete signing keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
